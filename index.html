<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere | Real-Time Weather</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient" id="bgGradient"></div>
    <div class="particles" id="particles"></div>
    
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </div>
                <span class="logo-text">Atmosphere</span>
            </div>
            
            <div class="controls">
                <button class="btn-location" id="btnLocation" title="Detect my location">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                </button>
                <div class="unit-toggle">
                    <button class="unit-btn active" data-unit="celsius">°C</button>
                    <button class="unit-btn" data-unit="fahrenheit">°F</button>
                </div>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search city..." autocomplete="off">
                <button class="search-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
            <div class="search-suggestions" id="searchSuggestions"></div>
        </section>

        <!-- Loading State -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <p class="loading-text">Fetching weather data...</p>
        </div>

        <!-- Main Weather Card -->
        <main class="main-content" id="mainContent">
            <div class="weather-card" id="weatherCard">
                <div class="weather-card-inner">
                    <!-- Front: Current Weather -->
                    <div class="weather-card-front">
                        <div class="location-info">
                            <h1 class="city-name" id="cityName">New York</h1>
                            <p class="country-name" id="countryName">United States</p>
                            <p class="current-date" id="currentDate">Monday, January 15</p>
                        </div>
                        
                        <div class="weather-main">
                            <div class="weather-icon-container">
                                <div class="weather-icon-3d" id="weatherIcon3d">
                                    <svg id="iconSvg" viewBox="0 0 100 100">
                                        <!-- Dynamic SVG content -->
                                    </svg>
                                </div>
                            </div>
                            <div class="temperature-display">
                                <span class="temp-value" id="tempValue">22</span>
                                <span class="temp-unit" id="tempUnit">°C</span>
                            </div>
                            <p class="weather-desc" id="weatherDesc">Partly Cloudy</p>
                        </div>

                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/>
                                    </svg>
                                </div>
                                <div class="detail-info">
                                    <span class="detail-label">Feels Like</span>
                                    <span class="detail-value" id="feelsLike">24°</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707"/>
                                        <circle cx="12" cy="12" r="4"/>
                                    </svg>
                                </div>
                                <div class="detail-info">
                                    <span class="detail-label">UV Index</span>
                                    <span class="detail-value" id="uvIndex">6</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9.59 4.59A2 2 0 1111 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/>
                                    </svg>
                                </div>
                                <div class="detail-info">
                                    <span class="detail-label">Wind</span>
                                    <span class="detail-value" id="windSpeed">12 km/h</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/>
                                    </svg>
                                </div>
                                <div class="detail-info">
                                    <span class="detail-label">Humidity</span>
                                    <span class="detail-value" id="humidity">65%</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M8 2v4M16 2v4M3 9h18M5 5h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"/>
                                    </svg>
                                </div>
                                <div class="detail-info">
                                    <span class="detail-label">Pressure</span>
                                    <span class="detail-value" id="pressure">1013 hPa</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M17 18a5 5 0 00-3-9 5 5 0 00-3 9M12 7V3m0 18v-4"/>
                                    </svg>
                                </div>
                                <div class="detail-info">
                                    <span class="detail-label">Precipitation</span>
                                    <span class="detail-value" id="precipitation">0 mm</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hourly Forecast -->
            <section class="hourly-section">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Hourly Forecast
                </h2>
                <div class="hourly-scroll" id="hourlyScroll">
                    <!-- Generated by JS -->
                </div>
            </section>

            <!-- 5-Day Forecast -->
            <section class="forecast-section">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    5-Day Forecast
                </h2>
                <div class="forecast-grid" id="forecastGrid">
                    <!-- Generated by JS -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by Open-Meteo API</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>'''
